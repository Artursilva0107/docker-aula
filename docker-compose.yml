services:
  db:
    image: mariadb:10.11git init
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: aluno123

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - 8080:80
    environment:
      - PMA_ARBITRARY=1
  web:
    image: nginx
    volumes:
    - ./meufrontend:/usr/share/nginx/html
    ports:
     - "8085:80"
  

